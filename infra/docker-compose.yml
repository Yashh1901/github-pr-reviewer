services:
  app:
    build: ..
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - rabbitmq
      - redis
    volumes:
      - ../:/app

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI at localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"