name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── JOB 1: Lint & Test (always runs) ─────────────────
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --ignore E501

      - name: Run tests
        env:
          GITHUB_WEBHOOK_SECRET: test_secret
          GITHUB_TOKEN: test_token
          GEMINI_API_KEY: test_key
        run: pytest tests/ -v --tb=short

  # ─── JOB 2: Build & Push Docker image ─────────────────
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/github-pr-reviewer:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/github-pr-reviewer:${{ github.sha }}

  # ─── JOB 3: Deploy to EC2 ─────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'

    steps:
      - name: Check EC2 secrets exist
        id: check_secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST not set — skipping deploy (EC2 not provisioned yet)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/github-pr-reviewer:latest
            docker stop pr-reviewer || true
            docker rm pr-reviewer || true
            docker run -d \
              --name pr-reviewer \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /home/ubuntu/pr-reviewer.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/github-pr-reviewer:latest
            echo "✅ Deployed successfully"